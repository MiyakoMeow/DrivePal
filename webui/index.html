<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知行车秘 — 模拟测试工作台</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="header">
        <span>知行车秘 — 模拟测试工作台</span>

    </div>

    <div class="main">
        <div class="panel-left">
            <div class="sidebar-tabs">
                <button class="tab-btn active" data-tab="simulate" onclick="switchTab('simulate')">驾驶模拟</button>
                <button class="tab-btn" data-tab="voice" onclick="switchTab('voice')">语音</button>
            </div>

            <div id="panel-simulate" class="tab-panel active">
                <div>
                    <div class="section-title">场景预设</div>
                    <div class="preset-row">
                        <select id="presetSelect" onchange="loadPreset(this.value)">
                            <option value="">-- 选择预设 --</option>
                        </select>
                    </div>
                </div>

                <div>
                    <div class="section-title">驾驶员状态</div>
                    <div class="field">
                        <label>情绪</label>
                        <select id="ctx-emotion" data-ctx-path="driver.emotion">
                            <option value="">（未设置）</option>
                            <option value="neutral">正常</option>
                            <option value="calm">平静</option>
                            <option value="anxious">焦虑</option>
                            <option value="fatigued">疲倦</option>
                            <option value="angry">愤怒</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>负荷</label>
                        <select id="ctx-workload" data-ctx-path="driver.workload">
                            <option value="">（未设置）</option>
                            <option value="low">低</option>
                            <option value="normal">正常</option>
                            <option value="high">高</option>
                            <option value="overloaded">过载</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>疲劳程度: <span id="fatigueVal" class="range-val">0.0</span></label>
                        <input type="range" id="ctx-fatigueLevel" data-ctx-path="driver.fatigue_level" min="0" max="1" step="0.1" value="0" oninput="document.getElementById('fatigueVal').textContent=parseFloat(this.value).toFixed(1)">
                    </div>
                </div>

                <div>
                    <div class="section-title">时空信息</div>
                    <div class="field">
                        <label>纬度</label>
                        <input type="number" step="any" id="ctx-lat" data-ctx-path="spatial.current_location.latitude" placeholder="例: 39.9042">
                    </div>
                    <div class="field">
                        <label>经度</label>
                        <input type="number" step="any" id="ctx-lng" data-ctx-path="spatial.current_location.longitude" placeholder="例: 116.4074">
                    </div>
                    <div class="field">
                        <label>地址</label>
                        <input type="text" id="ctx-address" data-ctx-path="spatial.current_location.address" placeholder="当前位置地址">
                    </div>
                    <div class="field">
                        <label>车速 (km/h)</label>
                        <input type="number" id="ctx-speedKmh" data-ctx-path="spatial.current_location.speed_kmh" placeholder="0" min="0">
                    </div>
                    <div class="field">
                        <label>目的地地址</label>
                        <input type="text" id="ctx-dest-address" data-ctx-path="spatial.destination.address" placeholder="目的地">
                    </div>
                    <div class="field">
                        <label>ETA (分钟)</label>
                        <input type="number" id="ctx-etaMinutes" data-ctx-path="spatial.eta_minutes" placeholder="预估到达时间" min="0">
                    </div>
                </div>

                <div>
                    <div class="section-title">交通状况</div>
                    <div class="field">
                        <label>拥堵程度</label>
                        <select id="ctx-congestionLevel" data-ctx-path="traffic.congestion_level">
                            <option value="">（未设置）</option>
                            <option value="smooth">畅通</option>
                            <option value="slow">缓行</option>
                            <option value="congested">拥堵</option>
                            <option value="blocked">严重拥堵</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>事故信息</label>
                        <input type="text" id="ctx-incidents" data-ctx-path="traffic.incidents" placeholder="事故描述（可选）">
                    </div>
                    <div class="field">
                        <label>延误 (分钟)</label>
                        <input type="number" id="ctx-delayMinutes" data-ctx-path="traffic.estimated_delay_minutes" placeholder="0" min="0">
                    </div>
                </div>

                <div>
                    <div class="section-title">驾驶场景</div>
                    <div class="field">
                        <label>场景类型</label>
                        <select id="ctx-scenario" data-ctx-path="scenario">
                            <option value="">（未设置）</option>
                            <option value="parked">停车场</option>
                            <option value="city_driving">城市道路</option>
                            <option value="highway">高速公路</option>
                            <option value="traffic_jam">交通拥堵</option>
                        </select>
                    </div>
                </div>

                <div class="btn-group">
                    <button class="btn btn-primary btn-sm" onclick="savePreset()">保存预设</button>
                    <button class="btn btn-secondary btn-sm" onclick="resetContext(document.querySelector('.panel-left'))">清空表单</button>
                </div>
            </div>

            <div id="panel-voice" class="tab-panel">
                <div class="section-title">录音控制</div>
                <div class="voice-controls">
                    <button id="voiceRecordBtn" class="btn btn-success btn-sm" onclick="toggleVoiceRecording()">● 开始录音</button>
                    <span id="voiceStatusText" class="voice-status-text">未启动</span>
                </div>

                <div class="section-title">设备选择</div>
                <select id="voiceDeviceSelect" onchange="changeVoiceDevice(this.value)">
                    <option value="">加载中...</option>
                </select>

                <div class="section-title">VAD 状态</div>
                <div id="voiceVadIndicator" class="vad-indicator idle">⚪ 空闲</div>

                <div class="section-title">配置</div>
                <details>
                    <summary style="cursor:pointer;font-size:13px;color:#555;">展开配置</summary>
                    <div class="voice-config-form">
                        <div class="field">
                            <label>VAD 模式 (0-3)</label>
                            <input type="number" id="voiceVadMode" value="1" min="0" max="3">
                        </div>
                        <div class="field">
                            <label>置信度阈值</label>
                            <input type="number" id="voiceMinConfidence" value="0.5" min="0" max="1" step="0.1">
                        </div>
                        <button class="btn btn-secondary btn-sm" onclick="applyVoiceConfig()">应用</button>
                    </div>
                </details>
            </div>
        </div>

        <div class="panel-right">
            <div id="panel-simulate-right" class="tab-panel active">
                <div class="card">
                    <div class="query-bar">
                        <input type="text" id="queryInput" placeholder="输入驾驶相关的查询..." onkeydown="if(event.key==='Enter')sendQuery()">
                        <button class="btn btn-primary" id="sendBtn" onclick="sendQuery()">发送</button>
                    </div>
                </div>

                <details class="stage" id="stage-context" open>
                    <summary>Context Agent</summary>
                    <div class="stage-body"><pre id="stage-context-body"><span class="empty-hint">等待查询...</span></pre></div>
                </details>

                <details class="stage" id="stage-task">
                    <summary>Task Agent</summary>
                    <div class="stage-body"><pre id="stage-task-body"><span class="empty-hint">等待查询...</span></pre></div>
                </details>

                <details class="stage" id="stage-decision">
                    <summary>Strategy Agent</summary>
                    <div class="stage-body"><pre id="stage-decision-body"><span class="empty-hint">等待查询...</span></pre></div>
                </details>

                <details class="stage" id="stage-execution">
                    <summary>Execution Agent</summary>
                    <div class="stage-body"><pre id="stage-execution-body"><span class="empty-hint">等待查询...</span></pre></div>
                    <div class="feedback-row" id="feedbackRow" style="display:none; padding: 0 14px 12px;">
                        <button class="btn btn-success btn-sm" onclick="submitFeedback('accept')">接受</button>
                        <button class="btn btn-secondary btn-sm" onclick="submitFeedback('ignore')">忽略</button>
                        <button class="btn btn-secondary btn-sm" onclick="submitFeedback('snooze')">延后5分钟</button>
                        <button class="btn btn-secondary btn-sm" onclick="submitFeedback('modify')">修改</button>
                    </div>
                    <div class="feedback-row" id="schedulerRow" style="padding: 0 14px 12px; border-top: 1px solid #eee; margin-top: 4px; padding-top: 8px;">
                        <span style="font-size:12px;color:#888;margin-right:8px;">调度器:</span>
                        <span id="schedulerStatus" style="font-size:12px;color:#888;">查询中...</span>
                        <button class="btn btn-secondary btn-sm" onclick="manualTriggerScheduler()" style="margin-left:8px;">手动触发</button>
                    </div>
                </details>

                <div class="card history-section">
                    <div class="section-title">历史记录</div>
                    <div id="historyList"><span class="empty-hint">暂无历史记录</span></div>
                </div>

                <details class="stage" id="stage-metrics" style="margin-top:8px;">
                    <summary>MemoryBank 指标</summary>
                    <div class="stage-body"><pre id="stage-metrics-body"><span class="empty-hint">等待查询...</span></pre></div>
                </details>
            </div>

            <div id="panel-voice-right" class="tab-panel">
                <div class="section-title">实时转录</div>
                <div id="voiceTranscriptionArea" class="voice-transcription-area">
                    <span class="empty-hint">等待语音输入...</span>
                </div>
                <div class="section-title" style="margin-top:16px;">转录历史</div>
                <div id="voiceHistoryList" class="voice-history-list">
                    <span class="empty-hint">暂无历史</span>
                </div>
            </div>
        </div>
    </div>

    <div class="experiment-section" style="max-width:1200px;margin:20px auto;padding:0 20px;">
        <div class="card" style="padding:16px;">
            <div class="section-title">实验结果对比</div>
            <canvas id="experimentChart" height="200"></canvas>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
