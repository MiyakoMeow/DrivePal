<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知行车秘 — 模拟测试工作台</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #1a1a2e;
            color: #fff;
            padding: 14px 24px;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header a { color: #8ab4f8; text-decoration: none; font-size: 13px; font-weight: 400; }
        .header a:hover { text-decoration: underline; }
        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        .panel-left {
            width: 320px;
            min-width: 320px;
            background: #fff;
            border-right: 1px solid #e0e0e0;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .panel-right {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            padding-bottom: 4px;
            border-bottom: 1px solid #eee;
        }
        .field { margin-bottom: 8px; }
        .field label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 3px;
        }
        .field input[type="text"],
        .field input[type="number"],
        .field select,
        .field textarea {
            width: 100%;
            padding: 7px 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 13px;
            outline: none;
            transition: border-color .2s;
        }
        .field input:focus, .field select:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 2px rgba(0,123,255,.15);
        }
        .field input[type="range"] {
            width: 100%;
            accent-color: #007bff;
        }
        .field .range-val {
            display: inline-block;
            font-size: 12px;
            color: #666;
            margin-left: 6px;
        }
        .card {
            background: #fff;
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 1px 3px rgba(0,0,0,.08);
        }
        .query-bar {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .query-bar input {
            flex: 1;
            padding: 9px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            outline: none;
        }
        .query-bar input:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 2px rgba(0,123,255,.15);
        }
        .btn {
            padding: 9px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background .2s;
            white-space: nowrap;
        }
        .btn-primary { background: #007bff; color: #fff; }
        .btn-primary:hover { background: #0056b3; }
        .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
        .btn-success { background: #28a745; color: #fff; }
        .btn-success:hover { background: #1e7e34; }
        .btn-secondary { background: #6c757d; color: #fff; }
        .btn-secondary:hover { background: #5a6268; }
        .btn-sm { padding: 5px 14px; font-size: 12px; }
        .memory-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .memory-row label { font-size: 13px; color: #555; white-space: nowrap; }
        .memory-row select { flex: 1; }
        .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .6s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        details.stage {
            background: #fafafa;
            border: 1px solid #e8e8e8;
            border-radius: 6px;
            overflow: hidden;
        }
        details.stage summary {
            padding: 10px 14px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            background: #f5f5f5;
            user-select: none;
        }
        details.stage summary:hover { background: #eee; }
        .stage-body {
            padding: 12px 14px;
            max-height: 400px;
            overflow: auto;
        }
        .stage-body pre {
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 12px;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            color: #333;
        }
        .stage-body .error {
            color: #dc3545;
            font-style: italic;
        }
        .feedback-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .history-section .section-title { margin-bottom: 10px; }
        .history-item {
            padding: 8px 12px;
            background: #f8f9fa;
            border-radius: 5px;
            margin-bottom: 6px;
            font-size: 13px;
            color: #333;
            border-left: 3px solid #007bff;
        }
        .history-item .meta { font-size: 11px; color: #999; margin-top: 2px; }
        .preset-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .preset-row select { flex: 1; }
        .btn-group { display: flex; gap: 8px; }
        .empty-hint {
            color: #aaa;
            font-size: 13px;
            text-align: center;
            padding: 20px 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <span>知行车秘 — 模拟测试工作台</span>
        <a href="/graphql" target="_blank">GraphQL Playground</a>
    </div>

    <div class="main">
        <div class="panel-left">
            <div>
                <div class="section-title">场景预设</div>
                <div class="preset-row">
                    <select id="presetSelect" onchange="loadPreset(this.value)">
                        <option value="">-- 选择预设 --</option>
                    </select>
                </div>
            </div>

            <div>
                <div class="section-title">记忆模式</div>
                <div class="memory-row">
                    <label>模式</label>
                    <select id="memoryMode">
                        <option value="MEMORY_BANK">MEMORY_BANK</option>
                        <option value="MEMOCHAT">MEMOCHAT</option>
                    </select>
                </div>
            </div>

            <div>
                <div class="section-title">驾驶员状态</div>
                <div class="field">
                    <label>情绪</label>
                    <select id="ctx-emotion">
                        <option value="">（未设置）</option>
                        <option value="neutral">正常</option>
                        <option value="calm">平静</option>
                        <option value="anxious">焦虑</option>
                        <option value="fatigued">疲倦</option>
                        <option value="angry">愤怒</option>
                    </select>
                </div>
                <div class="field">
                    <label>负荷</label>
                    <select id="ctx-workload">
                        <option value="">（未设置）</option>
                        <option value="low">低</option>
                        <option value="normal">正常</option>
                        <option value="high">高</option>
                        <option value="overloaded">过载</option>
                    </select>
                </div>
                <div class="field">
                    <label>疲劳程度: <span id="fatigueVal" class="range-val">0.0</span></label>
                    <input type="range" id="ctx-fatigueLevel" min="0" max="1" step="0.1" value="0" oninput="document.getElementById('fatigueVal').textContent=parseFloat(this.value).toFixed(1)">
                </div>
            </div>

            <div>
                <div class="section-title">时空信息</div>
                <div class="field">
                    <label>纬度</label>
                    <input type="number" step="any" id="ctx-lat" placeholder="例: 39.9042">
                </div>
                <div class="field">
                    <label>经度</label>
                    <input type="number" step="any" id="ctx-lng" placeholder="例: 116.4074">
                </div>
                <div class="field">
                    <label>地址</label>
                    <input type="text" id="ctx-address" placeholder="当前位置地址">
                </div>
                <div class="field">
                    <label>车速 (km/h)</label>
                    <input type="number" id="ctx-speedKmh" placeholder="0" min="0">
                </div>
                <div class="field">
                    <label>目的地地址</label>
                    <input type="text" id="ctx-dest-address" placeholder="目的地">
                </div>
                <div class="field">
                    <label>ETA (分钟)</label>
                    <input type="number" id="ctx-etaMinutes" placeholder="预估到达时间" min="0">
                </div>
            </div>

            <div>
                <div class="section-title">交通状况</div>
                <div class="field">
                    <label>拥堵程度</label>
                    <select id="ctx-congestionLevel">
                        <option value="">（未设置）</option>
                        <option value="smooth">畅通</option>
                        <option value="slow">缓行</option>
                        <option value="congested">拥堵</option>
                        <option value="blocked">严重拥堵</option>
                    </select>
                </div>
                <div class="field">
                    <label>事故信息</label>
                    <input type="text" id="ctx-incidents" placeholder="事故描述（可选）">
                </div>
                <div class="field">
                    <label>延误 (分钟)</label>
                    <input type="number" id="ctx-delayMinutes" placeholder="0" min="0">
                </div>
            </div>

            <div>
                <div class="section-title">驾驶场景</div>
                <div class="field">
                    <label>场景类型</label>
                    <select id="ctx-scenario">
                        <option value="">（未设置）</option>
                        <option value="parked">停车场</option>
                        <option value="city_driving">城市道路</option>
                        <option value="highway">高速公路</option>
                        <option value="traffic_jam">交通拥堵</option>
                    </select>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary btn-sm" onclick="savePreset()">保存预设</button>
                <button class="btn btn-secondary btn-sm" onclick="clearForm()">清空表单</button>
            </div>
        </div>

        <div class="panel-right">
            <div class="card">
                <div class="query-bar">
                    <input type="text" id="queryInput" placeholder="输入驾驶相关的查询..." onkeydown="if(event.key==='Enter')sendQuery()">
                    <button class="btn btn-primary" id="sendBtn" onclick="sendQuery()">发送</button>
                </div>
            </div>

            <details class="stage" id="stage-context" open>
                <summary>Context Agent</summary>
                <div class="stage-body"><pre id="stage-context-body"><span class="empty-hint">等待查询...</span></pre></div>
            </details>

            <details class="stage" id="stage-task">
                <summary>Task Agent</summary>
                <div class="stage-body"><pre id="stage-task-body"><span class="empty-hint">等待查询...</span></pre></div>
            </details>

            <details class="stage" id="stage-decision">
                <summary>Strategy Agent</summary>
                <div class="stage-body"><pre id="stage-decision-body"><span class="empty-hint">等待查询...</span></pre></div>
            </details>

            <details class="stage" id="stage-execution">
                <summary>Execution Agent</summary>
                <div class="stage-body"><pre id="stage-execution-body"><span class="empty-hint">等待查询...</span></pre></div>
                <div class="feedback-row" id="feedbackRow" style="display:none; padding: 0 14px 12px;">
                    <button class="btn btn-success btn-sm" onclick="submitFeedback('accept')">接受</button>
                    <button class="btn btn-secondary btn-sm" onclick="submitFeedback('ignore')">忽略</button>
                </div>
            </details>

            <div class="card history-section">
                <div class="section-title">历史记录</div>
                <div id="historyList"><span class="empty-hint">暂无历史记录</span></div>
            </div>
        </div>
    </div>

    <script>
        let currentEventId = null;

        async function graphql(query, variables) {
            const resp = await fetch('/graphql', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query, variables })
            });
            const json = await resp.json();
            if (json.errors && json.errors.length) {
                throw new Error(json.errors.map(e => e.message).join('; '));
            }
            return json.data;
        }

        function getContextInput() {
            const emotion = document.getElementById('ctx-emotion').value;
            const workload = document.getElementById('ctx-workload').value;
            const fatigueLevel = parseFloat(document.getElementById('ctx-fatigueLevel').value);
            const lat = document.getElementById('ctx-lat').value;
            const lng = document.getElementById('ctx-lng').value;
            const address = document.getElementById('ctx-address').value;
            const speedKmh = document.getElementById('ctx-speedKmh').value;
            const destAddress = document.getElementById('ctx-dest-address').value;
            const etaMinutes = document.getElementById('ctx-etaMinutes').value;
            const congestionLevel = document.getElementById('ctx-congestionLevel').value;
            const incidents = document.getElementById('ctx-incidents').value;
            const delayMinutes = document.getElementById('ctx-delayMinutes').value;
            const scenario = document.getElementById('ctx-scenario').value;

            const driver = {};
            if (emotion) driver.emotion = emotion;
            if (workload) driver.workload = workload;
            driver.fatigueLevel = fatigueLevel;

            const spatial = {};
            const curLoc = {};
            if (lat !== '') curLoc.latitude = parseFloat(lat);
            if (lng !== '') curLoc.longitude = parseFloat(lng);
            if (address) curLoc.address = address;
            if (speedKmh !== '') curLoc.speedKmh = parseFloat(speedKmh);
            if (Object.keys(curLoc).length) spatial.currentLocation = curLoc;

            const dest = {};
            if (destAddress) dest.address = destAddress;
            if (Object.keys(dest).length) spatial.destination = dest;

            if (etaMinutes !== '') spatial.etaMinutes = parseFloat(etaMinutes);

            const traffic = {};
            if (congestionLevel) traffic.congestionLevel = congestionLevel;
            if (incidents) traffic.incidents = [incidents];
            if (delayMinutes !== '') traffic.estimatedDelayMinutes = parseInt(delayMinutes, 10);

            const ctx = {};
            if (Object.keys(driver).length) ctx.driver = driver;
            if (Object.keys(spatial).length) ctx.spatial = spatial;
            if (Object.keys(traffic).length) ctx.traffic = traffic;
            if (scenario) ctx.scenario = scenario;

            return Object.keys(ctx).length ? ctx : null;
        }

        function fillForm(preset) {
            if (!preset) return;
            const ctx = preset.context || {};
            const d = ctx.driver || {};
            const s = ctx.spatial || {};
            const t = ctx.traffic || {};

            document.getElementById('ctx-emotion').value = d.emotion || '';
            document.getElementById('ctx-workload').value = d.workload || '';
            document.getElementById('ctx-fatigueLevel').value = d.fatigueLevel ?? 0;
            document.getElementById('fatigueVal').textContent = (d.fatigueLevel ?? 0).toFixed(1);

            const cl = s.currentLocation || {};
            document.getElementById('ctx-lat').value = cl.latitude ?? '';
            document.getElementById('ctx-lng').value = cl.longitude ?? '';
            document.getElementById('ctx-address').value = cl.address || '';
            document.getElementById('ctx-speedKmh').value = cl.speedKmh ?? '';

            const dest = s.destination || {};
            document.getElementById('ctx-dest-address').value = dest.address || '';
            document.getElementById('ctx-etaMinutes').value = s.etaMinutes ?? '';

            document.getElementById('ctx-congestionLevel').value = t.congestionLevel || '';
            document.getElementById('ctx-incidents').value = t.incidents || '';
            document.getElementById('ctx-delayMinutes').value = t.estimatedDelayMinutes ?? '';

            document.getElementById('ctx-scenario').value = ctx.scenario || '';
        }

        function clearForm() {
            document.getElementById('ctx-emotion').value = '';
            document.getElementById('ctx-workload').value = '';
            document.getElementById('ctx-fatigueLevel').value = 0;
            document.getElementById('fatigueVal').textContent = '0.0';
        }

        function formatJson(val) {
            if (val === null || val === undefined) return 'null';
            try {
                return JSON.stringify(val, null, 2);
            } catch {
                return String(val);
            }
        }

        function setLoading(on) {
            const btn = document.getElementById('sendBtn');
            btn.disabled = on;
            btn.innerHTML = on ? '<span class="spinner"></span>处理中...' : '发送';
        }

        async function loadPresets() {
            try {
                const data = await graphql(`{ scenarioPresets { id name context { driver { emotion workload fatigueLevel } spatial { currentLocation { latitude longitude address speedKmh } destination { latitude longitude address speedKmh } etaMinutes } traffic { congestionLevel incidents estimatedDelayMinutes } scenario } } }`);
                const sel = document.getElementById('presetSelect');
                sel.innerHTML = '<option value="">-- 选择预设 --</option>';
                (data.scenarioPresets || []).forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.textContent = p.name;
                    opt.dataset.preset = JSON.stringify(p);
                    sel.appendChild(opt);
                });
            } catch (e) {
                console.error('Failed to load presets:', e);
            }
        }

        function loadPreset(id) {
            const sel = document.getElementById('presetSelect');
            const opt = sel.selectedOptions[0];
            if (!opt || !opt.dataset.preset) return;
            fillForm(JSON.parse(opt.dataset.preset));
        }

        async function savePreset() {
            const name = prompt('请输入预设名称:');
            if (!name) return;
            const context = getContextInput();
            if (!context) { alert('请至少填写一项上下文信息'); return; }
            try {
                await graphql(
                    `mutation SavePreset($name: String!, $context: DrivingContextInput!) { saveScenarioPreset(input: { name: $name, context: $context }) { id name } }`,
                    { name, context }
                );
                alert('预设已保存');
                loadPresets();
            } catch (e) {
                alert('保存失败: ' + e.message);
            }
        }

        async function sendQuery() {
            const query = document.getElementById('queryInput').value.trim();
            if (!query) return;

            const memoryMode = document.getElementById('memoryMode').value;
            const context = getContextInput();

            setLoading(true);
            document.getElementById('feedbackRow').style.display = 'none';
            ['context', 'task', 'decision', 'execution'].forEach(s => {
                document.getElementById(`stage-${s}-body`).innerHTML = '<span class="empty-hint">处理中...</span>';
            });

            try {
                const data = await graphql(
                    `mutation ProcessQuery($query: String!, $memoryMode: MemoryModeEnum!, $context: DrivingContextInput) {
                        processQuery(input: { query: $query, memoryMode: $memoryMode, context: $context }) {
                            result eventId stages { context task decision execution }
                        }
                    }`,
                    { query, memoryMode, context }
                );

                const res = data.processQuery;
                currentEventId = res.eventId;

                const stages = res.stages || {};
                document.getElementById('stage-context-body').textContent = formatJson(stages.context);
                document.getElementById('stage-task-body').textContent = formatJson(stages.task);
                document.getElementById('stage-decision-body').textContent = formatJson(stages.decision);
                document.getElementById('stage-execution-body').textContent = formatJson(stages.execution);

                if (currentEventId) {
                    document.getElementById('feedbackRow').style.display = 'flex';
                }

                loadHistory();
            } catch (e) {
                ['context', 'task', 'decision', 'execution'].forEach(s => {
                    const el = document.getElementById(`stage-${s}-body`);
                    if (el.querySelector('.empty-hint')) {
                        el.innerHTML = `<span class="error">Error: ${e.message}</span>`;
                    }
                });
            } finally {
                setLoading(false);
            }
        }

        async function submitFeedback(action) {
            if (!currentEventId) return;
            try {
                await graphql(
                    `mutation SubmitFeedback($eventId: String!, $action: String!) {
                        submitFeedback(input: { eventId: $eventId, action: $action }) { status }
                    }`,
                    { eventId: currentEventId, action }
                );
                document.getElementById('feedbackRow').style.display = 'none';
            } catch (e) {
                alert('反馈提交失败: ' + e.message);
            }
        }

        async function loadHistory() {
            try {
                const mode = document.getElementById('memoryMode').value;
                const data = await graphql(
                    `query GetHistory($limit: Int!, $memoryMode: MemoryModeEnum!) {
                        history(limit: $limit, memoryMode: $memoryMode) { id content createdAt }
                    }`,
                    { limit: 10, memoryMode: mode }
                );
                const container = document.getElementById('historyList');
                const items = data.history || [];
                if (!items.length) {
                    container.innerHTML = '<span class="empty-hint">暂无历史记录</span>';
                    return;
                }
                container.innerHTML = '';
                items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    div.innerHTML = `${escapeHtml(item.content || JSON.stringify(item))}<div class="meta">${item.createdAt || ''}</div>`;
                    container.appendChild(div);
                });
            } catch (e) {
                console.error('Failed to load history:', e);
            }
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        loadPresets();
        loadHistory();
    </script>
</body>
</html>
