[src]
exclude = [".agents/**"]

[analysis]
replace-imports-with-any = ["faiss", "docx", "pyaudio", "sherpa_onnx"]

[rules]
all = "error"

[[overrides]]
include = ["tests/memory/test_schemas.py"]
rules = { "unresolved-attribute" = "ignore" }  # MemoryEvent ConfigDict(extra="allow") 允许动态属性

[[overrides]]
include = ["tests/memory/test_memory_bank.py"]
rules = { "invalid-assignment" = "ignore" }  # mock 替换 _index.load 时类型不匹配

[[overrides]]
include = ["tests/agents/test_llm_json_validation.py"]
rules = { "invalid-assignment" = "ignore" }  # mock 替换 _call_llm_json 时类型不匹配

[[overrides]]
include = ["tests/models/test_chat.py"]
rules = { "invalid-assignment" = "ignore", "unresolved-attribute" = "ignore" }  # mock 替换 generate 时类型不匹配

[[overrides]]
include = ["tests/experiments/test_ablation_runner.py"]
rules = { "invalid-assignment" = "ignore" }  # 因 spy 替换 _run_agent_workflow 时签名不含 self

[[overrides]]
include = ["tests/agents/test_workflow_tool.py"]
rules = { "unresolved-attribute" = "ignore" }  # mock 替换 ToolSpec.handler 时类型不匹配

[[overrides]]
include = ["tests/voice/test_service.py"]
rules = { "invalid-assignment" = "ignore" }  # mock 替换 start/stop 时类型不匹配

[[overrides]]
include = ["tests/voice/test_pipeline.py"]
rules = { "invalid-assignment" = "ignore", "unresolved-attribute" = "ignore" }  # mock 替换 transcribe/process_frame 时类型不匹配

[[overrides]]
include = ["app/voice/pipeline.py"]
rules = { "unresolved-attribute" = "ignore" }  # VADStatus(StrEnum).name 在 pyright 中未解析

[[overrides]]
include = ["app/voice/asr.py"]
rules = { "unresolved-attribute" = "ignore" }  # sherpa_onnx.OfflineRecognizer 为 C 扩展无类型桩

[[overrides]]
include = ["app/api/main.py"]
rules = { "invalid-argument-type" = "ignore" }  # add_exception_handler 签名与 AppError 子类不兼容，FastAPI 运行时正常工作

[[overrides]]
include = ["experiments/vehicle_mem_bench/__main__.py"]
rules = { "unresolved-import" = "ignore" }  # VehicleMemBench 跨项目模块，运行时加入 sys.path

[[overrides]]
include = ["experiments/vehicle_mem_bench/adapter.py"]
rules = { "unresolved-import" = "ignore" }  # VehicleMemBench 跨项目模块，运行时加入 sys.path
