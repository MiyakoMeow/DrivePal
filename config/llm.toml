[model_groups.default]
models = ["local/qwen3.5-2b"]

[model_groups.benchmark]
models = ["local/qwen3.5-2b?temperature=0.0&max_tokens=8192"]

[model_groups.smart]
models = ["deepseek/deepseek-chat"]

[model_groups.fast]
models = ["zhipuai-coding-plan/glm-4.7-flashx?temperature=0.1"]

[model_groups.balanced]
models = ["minimax-cn/MiniMax-M2.5"]

[model_providers.local]
base_url = "http://127.0.0.1:50721/v1"
api_key = "none"
concurrency = 4

[model_providers.minimax-cn]
base_url = "https://api.minimaxi.com/v1"
api_key_env = "MINIMAX_API_KEY"
concurrency = 4

[model_providers.zhipuai-coding-plan]
base_url = "https://open.bigmodel.cn/api/paas/v4"
api_key_env = "ZHIPU_API_KEY"
concurrency = 4

[model_providers.deepseek]
base_url = "https://api.deepseek.com/v1"
api_key_env = "DEEPSEEK_API_KEY"
concurrency = 8

[embedding]
model = "local/text-embedding-bge-m3"
