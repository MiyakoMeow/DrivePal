name: No Inline Suppressions

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  noqa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0

      - run: |
          matches=$(grep -rn --include='*.py' \
            --exclude-dir=.agents \
            --exclude-dir=.venv \
            --exclude-dir=__pycache__ \
            --exclude-dir='*.egg-info' \
            '# noqa' . || true)
          if [ -n "$matches" ]; then
            echo "Found # noqa comments in source code:"
            echo "$matches"
            exit 1
          fi
          echo "No # noqa comments found. Clean!"

  type-ignore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0

      - run: |
          matches=$(grep -rn --include='*.py' \
            --exclude-dir=.agents \
            --exclude-dir=.venv \
            --exclude-dir=__pycache__ \
            --exclude-dir='*.egg-info' \
            '# type:' . || true)
          if [ -n "$matches" ]; then
            echo "Found # type: comments in source code:"
            echo "$matches"
            exit 1
          fi
          echo "No # type: comments found. Clean!"

  ty-ignore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0

      - run: |
          matches=$(grep -rn --include='*.py' \
            --exclude-dir=.agents \
            --exclude-dir=.venv \
            --exclude-dir=__pycache__ \
            --exclude-dir='*.egg-info' \
            '# ty:' . || true)
          if [ -n "$matches" ]; then
            echo "Found # ty: comments in source code:"
            echo "$matches"
            exit 1
          fi
          echo "No # ty: comments found. Clean!"
