[pytest]
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
timeout = 30
addopts = -n auto
filterwarnings =
    # Python 3.14 + FAISS(SWIG) 兼容：importlib 报告 builtin type 缺 __module__
    ignore:builtin type Swig:DeprecationWarning
    # webrtcvad 内部使用已弃用的 pkg_resources，第三方包无法修改
    ignore::DeprecationWarning:webrtcvad
