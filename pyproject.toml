[project]
name = "thesis-cockpit-memo"
version = "0.1.0"
description = "车载AI智能体原型系统"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "langchain-core>=0.3.0",
    "langchain-openai>=0.2.0",
    "langgraph>=0.2.0",
    "langchain-community>=0.3.0",
    "pydantic>=2.9.0",
    "python-dotenv>=1.0.0",
    "datasets>=2.14.0",
]

[tool.ty.rules]
invalid-argument-type = "ignore"
unknown-argument = "ignore"
invalid-parameter-default = "ignore"

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.6.0",
]

[dependency-groups]
dev = [
    "mypy>=1.19.1",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "ruff>=0.15.7",
    "ty>=0.0.26",
]
