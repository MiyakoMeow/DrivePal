[project]
name = "thesis-cockpit-memo"
version = "0.1.0"
description = "车载AI智能体原型系统"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "fastapi>=0.135.2",
    "uvicorn[standard]>=0.42.0",
    "openai>=1.82.0",
    "pydantic>=2.12.5",
    "python-dotenv>=1.0.0",
    "datasets>=4.8.4",
    "huggingface-hub>=1.8.0",
    "sentence-transformers>=5.3.0",
]

[dependency-groups]
dev = [
    "mypy>=1.19.1",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.15.8",
    "ty>=0.0.26",
]

