[project]
name = "thesis-cockpit-memo"
version = "0.1.0"
description = "车载AI智能体原型系统"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "fastapi>=0.135.2",
    "uvicorn[standard]>=0.42.0",
    "langchain-core>=1.2.22",
    "langchain-openai>=1.1.12",
    "langgraph>=1.1.3",
    "langchain-community>=0.4.1",
    "pydantic>=2.12.5",
    "python-dotenv>=1.0.0",
    "datasets>=4.8.4",
    "huggingface-hub>=1.8.0",
    "sentence-transformers>=5.3.0",
    "langchain-huggingface>=1.2.1",
]

[dependency-groups]
dev = [
    "mypy>=1.19.1",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.15.8",
    "ty>=0.0.26",
]

[tool.ruff.lint]
extend-select = ["D"]
ignore = ["D211", "D213", "D203"]

[tool.ruff.lint.per-file-ignores]
"vendor/**" = ["ALL"]
"adapters/runner.py" = ["E402"]

[tool.ruff.format]
exclude = ["vendor/**"]

[tool.ty.src]
exclude = ["vendor"]

[tool.ty.analysis]
allowed-unresolved-imports = ["evaluation.**"]

[tool.ty.rules]
all = "error"

[tool.pytest.ini_options]
testpaths = ["tests"]

