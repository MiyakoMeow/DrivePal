[lint]
extend-select = ["ALL"]
# 忽略的规则：
# D203/D211: class docstring前空行规则互相冲突
# D213: 与D212冲突（多行docstring摘要位置）
# D400: docstring首行句号
# E501: 行长度限制由formatter处理
ignore = [
    "D203",  # pydocstyle - docstring前应有1个空行(与D211冲突)
    "D211",  # pydocstyle - docstring前不应有空行(与D203冲突)
    "D213",  # pydocstyle - 多行docstring应在第二行开始
    "D400",  # pydocstyle - docstring首行应以句号结尾
    "D415",  # pydocstyle - docstring首行需以标点结尾
    "COM812",  # 与formatter冲突（formatter自动处理尾随逗号）
    "E501",  # pycodestyle - 行长度限制
    "RUF001",  # 全角字符检查（中文项目无需修改）
    "RUF002",  # docstring全角字符检查（中文项目无需修改）
    "RUF003",  # 注释全角字符检查（中文项目无需修改）
]
exclude = [".agents/**"]

[lint.per-file-ignores]
"app/api/graphql_schema.py" = ["TC002"]  # Strawberry GraphQL 需要运行时导入类型
"app/api/stream.py" = ["TC001"]  # FastAPI 路由注解需要运行时解析 ProcessQueryRequest

"app/memory/memory_bank/llm.py" = [
    "ANN401",  # LlmClient 接受任意有 generate 方法的对象（duck typing）
]
"app/api/resolvers/mutation.py" = [
    "ARG002",  # close_session current_user 参数保留——Strawberry mutation 签名一致性
]
"app/models/embedding.py" = ["S311"]  # retry jitter 使用伪随机种子，非安全场景
"app/storage/init_data.py" = ["TC003"]  # Path 用于 init_storage 参数注解及运行时 data_dir.mkdir()/ 操作，ruff 误判

"app/memory/memory_bank/forget.py" = ["S311"]  # 概率遗忘使用伪随机种子，非安全场景
"app/memory/memory_bank/store.py" = [
    "BLE001",  # close() 中宽捕获 Exception 合理——持久化失败不应阻止 shutdown
    "ARG002",  # user_id 保留——MemoryStore Protocol 接口兼容
]
"app/agents/workflow.py" = [
    "C901",  # _execution_node 含多条安全规则分支，复杂度可接受
    "PLR0912",  # _execution_node 多条件分支——快捷指令/后处理/延迟/频次/正常路径
    "PLR0915",  # _execution_node + run_stream 语句多——安全关键路径不宜强行拆分
    "FBT001",  # setter 接受 bool 参数（消融实验标记）
]


"app/agents/pending.py" = [
    "PLR0913",  # PendingReminder.new / PendingReminderManager.add 参数>5合理（均为配置字段）
]
"app/agents/rules.py" = [
    "C901",  # postprocess_decision 含三约束分支+修改追踪，复杂度可接受
    "PLW0603",  # 模块级缓存（fatigue_threshold/ablation标志）需 global
    "FBT001",  # setter 接受 bool 参数（消融实验标记）
]
"app/agents/probabilistic.py" = [
    "ANN401",  # infer_intent memory_store 为 duck-typing Any
    "FBT001",  # setter 接受 bool 参数（消融实验标记）
]
"experiments/ablation/scenario_synthesizer.py" = [
    "S311",  # random.Random 用于分层抽样复现种子，非安全场景
    "T201",  # _verify() 调试入口 print 合理
    "TC003",  # Path 用于类型注解但实际运行时 path.open()/exists() 操作，ruff 误判
]
"experiments/ablation/cli.py" = [
    "T201",  # CLI 入口用 print 输出进度，非生产日志
    "C901",  # main() 入口编排多组实验，复杂度可接受
    "PLR0912",  # main() 含多个 CLI 分支（synthesize/judge_only/并发/串行），逻辑清晰
    "PLR0915",  # main() 含 CLI 分支 + 配置写入 + 报告生成，语句超 50 但平铺直叙
    "PLR2004",  # 元组长度检查等魔法数字在编排逻辑中可接受
]
"experiments/ablation/judge.py" = [
    "S311",  # 确定性种子用于可复现实验（盲评 shuffle）
]

"experiments/ablation/safety_group.py" = [
    "TC001",  # AblationRunner/Judge 仅用于类型注解，项目惯例不拆 TYPE_CHECKING
    "TC003",  # Path 用于类型注解及运行时 mkdir()/open() 操作，ruff 误判
]
"experiments/ablation/architecture_group.py" = [
    "TC001",  # AblationRunner/Judge 仅用于类型注解，项目惯例不拆 TYPE_CHECKING
    "TC003",  # Path 用于类型注解及运行时 mkdir()/open() 操作，ruff 误判
    "BLE001",  # _score_one 捕获所有异常记录并返回空 dict，不重抛
    "PLR2004",  # len(latencies) 比较魔法数字（1/2），延迟分析常见模式
]
"experiments/ablation/metrics.py" = [
    "TC001",  # JudgeScores/VariantResult 仅用于类型注解，项目惯例不拆 TYPE_CHECKING
]
"experiments/ablation/report.py" = [
    "TC001",  # GroupResult 仅用于类型注解，项目惯例不拆 TYPE_CHECKING
    "TC003",  # Path 用于类型注解及运行时 mkdir()/Path.open() 操作，ruff 误判
]
"experiments/ablation/personalization_group.py" = [
    "S311",  # random.Random 用于实验可复现种子，非安全场景
    "TC001",  # AblationRunner 仅用于类型注解
    "TC003",  # Path 用于类型注解及运行时操作
    "BLE001",  # update_feedback_weight 失败记录日志后跳过，不中断实验
    "C901",  # run_personalization_group 含 4 阶段 × 20 轮 × 2 变体编排，复杂度可接受
]

"app/memory/memory_bank/lifecycle.py" = [
    "PLR0913",  # __init__ 参数≥6合理（含多个依赖注入）
    "BLE001",  # 后台摘要失败不阻塞主流程，宽捕获 Exception 合理
]
"app/memory/exceptions.py" = [
    "N818",  # 异常命名不强制 Error 后缀（如 LLMCallFailed 语义更精确）
]

"app/memory/memory_bank/index.py" = [
    "C901",  # load() 含三级降级分支，复杂度合理
    "PLR0915",  # 降级恢复逻辑多但平铺直叙
    "PLR0912",  # 降级分支 13 > 12，每个分支平铺直叙
]


"tests/**" = [
    "S101",  # 测试中使用 assert 是标准做法
    "S311",  # 测试中使用伪随机种子是标准做法
    "SLF001",  # 测试中访问私有成员是常见做法
    "RUF005",  # 测试中使用列表拼接是常见做法
    "RUF015",  # 测试中使用列表切片是常见做法
    "FURB171",  # 测试中成员测试是常见做法
    "RUF043",  # pytest.raises match参数中正则模式常见
    "RUF059",  # 测试中未使用解包变量常见
    "ANN",  # 测试方法无需类型注解
    "ARG001",  # 测试 fixture 参数未直接使用（由 pytest 注入）
    "ARG002",  # 测试 fake 中未用参数（为满足基类签名而保留）
    "ASYNC240",  # 测试中同步写临时文件比 to_thread 更简洁
    "D101",  # 测试类无需 docstring
    "D102",  # 测试方法无需 docstring
    "D103",  # 测试函数无需 docstring
    "D403",  # 测试 docstring 首词大写非强制
    "ERA001",  # 测试中公式注释合理
    "F401",  # 测试 fixtures 中导入为 pytest 发现机制需要
    "PERF401",  # 测试中 for-loop 构建 fixture 数据可读性优先
    "PLC0415",  # 测试中局部导入合理
    "PLR2004",  # 测试中魔法数字（期望值）是标准做法
]

[format]
exclude = [".agents/**"]
