    "BLE001",  # WebSocket send 失败类型不可预测，宽捕获合理
]

"app/api/schemas.py" = ["TC001"]  # Pydantic BaseModel 字段需运行时引用 DrivingContext
"app/api/errors.py" = ["TC002"]  # RequestValidationError 运行时导入，非 TYPE_CHECKING
